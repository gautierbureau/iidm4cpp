name: Release

on:
  release:
    types: [published]

jobs:
  # ── Java fat-JAR ──────────────────────────────────────────────────────────
  # Runs first so release-cpp can download the JAR to build the native image.
  release-java:
    name: Release Java JAR
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build fat-JAR
        working-directory: java
        run: mvn --batch-mode --no-transfer-progress package -DskipTests

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: java/target/iidm-bridge-java-*-fat.jar

      - name: Upload workflow artifact (for release-cpp)
        uses: actions/upload-artifact@v4
        with:
          name: release-jar
          path: java/target/iidm-bridge-java-*-fat.jar
          retention-days: 1

  # ── C++ packages for Linux, macOS, Windows ───────────────────────────────
  #
  # Linux and macOS:
  #   - Built with IIDM_BRIDGE_ENABLE_GRAALVM=ON (stub graal_isolate.h at
  #     compile time, same pattern as the graalvm CI job).
  #   - The real libpowsybl-iidm-native.{so,dylib} is built from the fat-JAR
  #     and copied into install/lib/ so the package is self-contained.
  #
  # Windows:
  #   - Built with IIDM_BRIDGE_ENABLE_GRAALVM=OFF (GraalVM --shared conflicts
  #     with the MSVC toolchain).
  release-cpp:
    name: Release C++ package (${{ matrix.name }})
    needs: release-java
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x86_64
            graalvm: ON
            native_lib: libpowsybl-iidm-native.so
          - os: macos-latest
            name: macos
            graalvm: ON
            native_lib: libpowsybl-iidm-native.dylib
          - os: windows-latest
            name: windows-x86_64
            graalvm: OFF

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GraalVM CE provides both JDK and native-image on Linux/macOS.
      - name: Set up GraalVM CE 21 with native-image (Linux / macOS)
        if: matrix.graalvm == 'ON'
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          native-image: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21 (Windows)
        if: matrix.graalvm == 'OFF'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install C++ build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build

      - name: Install C++ build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Produce graal_isolate.h from a minimal stub so the GraalVM backend
      # can be compiled without the full native image being available yet.
      - name: Generate GraalVM stub (Linux / macOS)
        if: matrix.graalvm == 'ON'
        shell: bash
        run: |
          mkdir -p graalvm-stub
          cd graalvm-stub

          cat > IidmStub.java << 'JAVA_EOF'
          import org.graalvm.nativeimage.IsolateThread;
          import org.graalvm.nativeimage.c.function.CEntryPoint;
          public final class IidmStub {
              public static void main(String[] args) {}
              @CEntryPoint(name = "iidm_stub_ping")
              public static int ping(IsolateThread thread) { return 42; }
          }
          JAVA_EOF

          javac IidmStub.java
          native-image --shared --no-fallback -H:Name=libIidmStub IidmStub

      - name: Configure CMake
        shell: bash
        run: |
          EXTRA=""
          if [ "${{ matrix.graalvm }}" = "ON" ]; then
            EXTRA="-DGRAALVM_INCLUDE_DIRS=${{ github.workspace }}/graalvm-stub"
          fi
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DIIDM_BRIDGE_ENABLE_GRAALVM=${{ matrix.graalvm }} \
            -DIIDM_BRIDGE_ENABLE_JNI=ON \
            -DIIDM_BRIDGE_BUILD_TESTS=OFF \
            -DIIDM_BRIDGE_BUILD_EXAMPLES=OFF \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install" \
            $EXTRA

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build

      - name: Download fat-JAR (Linux / macOS)
        if: matrix.graalvm == 'ON'
        uses: actions/download-artifact@v4
        with:
          name: release-jar
          path: jar

      # Build the real powsybl native image from the fat-JAR and place it
      # directly into install/lib/ so the package is self-contained.
      - name: Build native image (Linux / macOS)
        if: matrix.graalvm == 'ON'
        shell: bash
        run: |
          JAR=$(ls jar/*.jar | head -1)
          native-image \
            --shared \
            -cp "$JAR" \
            -H:+ReportExceptionStackTraces \
            -march=compatibility \
            --no-fallback \
            --gc=serial \
            -o "${{ github.workspace }}/install/lib/libpowsybl-iidm-native" \
            --allow-incomplete-classpath \
            --add-exports=org.graalvm.nativeimage.builder/com.oracle.svm.core.c=ALL-UNNAMED

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          PKG="iidm-bridge-${{ github.ref_name }}-${{ matrix.name }}.tar.gz"
          tar -czf "$PKG" -C "${{ github.workspace }}/install" .
          echo "PKG_FILE=$PKG" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "iidm-bridge-${{ github.ref_name }}-${{ matrix.name }}.zip"
          Compress-Archive -Path "${{ github.workspace }}\install\*" -DestinationPath $pkg
          "PKG_FILE=$pkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PKG_FILE }}

      # Short-lived workflow artifact for the smoke-test job.
      - name: Upload workflow artifact (for smoke test)
        if: matrix.graalvm == 'ON'
        uses: actions/upload-artifact@v4
        with:
          name: release-pkg-${{ matrix.name }}
          path: ${{ env.PKG_FILE }}
          retention-days: 1

  # ── Smoke test: find_package + GraalVM backend end-to-end ────────────────
  #
  # Downloads the self-contained Linux package and verifies that a consumer
  # CMake project can find_package(IidmBridge), link, and load IEEE14.xiidm
  # through the bundled GraalVM native image.
  smoke-test:
    name: Smoke test (${{ matrix.name }})
    needs: release-cpp
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x86_64
            lib_path_env: LD_LIBRARY_PATH

    steps:
      - name: Checkout (for IEEE14.xiidm)
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install CMake and Ninja
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build

      - name: Download release package
        uses: actions/download-artifact@v4
        with:
          name: release-pkg-${{ matrix.name }}
          path: pkg

      - name: Extract release package
        run: |
          mkdir -p "${{ github.workspace }}/iidmbridge"
          tar -xzf pkg/*.tar.gz -C "${{ github.workspace }}/iidmbridge"

      - name: Write consumer project
        shell: bash
        run: |
          mkdir -p consumer

          cat > consumer/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(smoke_test CXX)
          set(CMAKE_CXX_STANDARD 17)
          find_package(IidmBridge REQUIRED)
          add_executable(smoke_test main.cpp)
          target_link_libraries(smoke_test PRIVATE IidmBridge::iidmbridge)
          EOF

          cat > consumer/main.cpp << 'EOF'
          #include <iidm/iidm.h>
          #include <iostream>

          int main(int argc, char* argv[]) {
              if (argc < 2) {
                  std::cerr << "Usage: smoke_test <path-to-xiidm>\n";
                  return 1;
              }
              iidm::NetworkLoadOptions opts;
              opts.mode = iidm::BackendMode::GRAALVM;
              auto network = iidm::NetworkFactory::load(argv[1], opts);
              auto gen = network.getGenerator("_GEN____3_SM");
              if (!gen.has_value()) {
                  std::cerr << "Generator _GEN____3_SM not found\n";
                  return 2;
              }
              std::cout << "targetP(_GEN____3_SM) = " << gen->getTargetP() << " MW\n";
              return 0;
          }
          EOF

      - name: Configure consumer project
        run: |
          cmake -S consumer -B consumer/build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/iidmbridge"

      - name: Build consumer project
        run: cmake --build consumer/build --parallel

      - name: Run smoke test
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/iidmbridge/lib
        run: ./consumer/build/smoke_test examples/IEEE14.xiidm

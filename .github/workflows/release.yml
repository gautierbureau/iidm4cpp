name: Release

on:
  release:
    types: [published]

jobs:
  # ── Java fat-JAR ──────────────────────────────────────────────────────────
  # Runs first so release-cpp can download the JAR to build native images.
  release-java:
    name: Release Java JAR
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build fat-JAR
        working-directory: java
        run: mvn --batch-mode --no-transfer-progress package -DskipTests

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: java/target/iidm-bridge-java-*-fat.jar

      - name: Upload workflow artifact (for release-cpp)
        uses: actions/upload-artifact@v4
        with:
          name: release-jar
          path: java/target/iidm-bridge-java-*-fat.jar
          retention-days: 1

  # ── C++ packages ─────────────────────────────────────────────────────────
  #
  # Three variants per platform:
  #   graalvm  – GraalVM backend only; libpowsybl-iidm-native bundled in lib/;
  #              no JVM dependency for consumers.
  #   jni      – JNI backend only; consumers need a JVM on their link path.
  #   full     – both backends compiled in; libpowsybl-iidm-native bundled.
  #
  # Windows ships jni-only: GraalVM --shared is not supported with MSVC.
  release-cpp:
    name: Release C++ package (${{ matrix.name }})
    needs: release-java
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────────────────
          - os: ubuntu-22.04
            name: linux-x86_64-graalvm
            graalvm: ON
            jni: OFF
            native_image: true
          - os: ubuntu-22.04
            name: linux-x86_64-jni
            graalvm: OFF
            jni: ON
            native_image: false
          - os: ubuntu-22.04
            name: linux-x86_64-full
            graalvm: ON
            jni: ON
            native_image: true
          # ── macOS ──────────────────────────────────────────────────────
          - os: macos-latest
            name: macos-graalvm
            graalvm: ON
            jni: OFF
            native_image: true
          - os: macos-latest
            name: macos-jni
            graalvm: OFF
            jni: ON
            native_image: false
          - os: macos-latest
            name: macos-full
            graalvm: ON
            jni: ON
            native_image: true
          # ── Windows (JNI only) ─────────────────────────────────────────
          - os: windows-latest
            name: windows-x86_64-jni
            graalvm: OFF
            jni: ON
            native_image: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GraalVM CE provides JDK + native-image when the GraalVM backend is
      # compiled in or when a native image must be built.
      - name: Set up GraalVM CE 21 with native-image
        if: matrix.graalvm == 'ON'
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          native-image: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21 (JNI-only builds)
        if: matrix.graalvm == 'OFF'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install C++ build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build

      - name: Install C++ build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Produce graal_isolate.h via a minimal stub so the GraalVM backend
      # compiles without the full native image being present yet.
      - name: Generate GraalVM stub header
        if: matrix.graalvm == 'ON'
        shell: bash
        run: |
          mkdir -p graalvm-stub
          cd graalvm-stub

          cat > IidmStub.java << 'JAVA_EOF'
          import org.graalvm.nativeimage.IsolateThread;
          import org.graalvm.nativeimage.c.function.CEntryPoint;
          public final class IidmStub {
              public static void main(String[] args) {}
              @CEntryPoint(name = "iidm_stub_ping")
              public static int ping(IsolateThread thread) { return 42; }
          }
          JAVA_EOF

          javac IidmStub.java
          native-image --shared --no-fallback -H:Name=libIidmStub IidmStub

      - name: Configure CMake
        shell: bash
        run: |
          EXTRA=""
          if [ "${{ matrix.graalvm }}" = "ON" ]; then
            EXTRA="-DGRAALVM_INCLUDE_DIRS=${{ github.workspace }}/graalvm-stub"
          fi
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DIIDM_BRIDGE_ENABLE_GRAALVM=${{ matrix.graalvm }} \
            -DIIDM_BRIDGE_ENABLE_JNI=${{ matrix.jni }} \
            -DIIDM_BRIDGE_BUILD_TESTS=OFF \
            -DIIDM_BRIDGE_BUILD_EXAMPLES=OFF \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install" \
            $EXTRA

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build

      # Bundle libjvm so consumers can run the JNI backend without a
      # separate JDK installation.  The JVM library is discovered from
      # JAVA_HOME to handle different JDK layouts across platforms.
      - name: Bundle JVM library (Linux / macOS JNI variants)
        if: matrix.jni == 'ON' && runner.os != 'Windows'
        shell: bash
        run: |
          JVM_LIB=$(find "$JAVA_HOME" -name "libjvm.*" | head -1)
          echo "Bundling $JVM_LIB"
          cp "$JVM_LIB" "${{ github.workspace }}/install/lib/"

      - name: Bundle JVM library (Windows JNI variant)
        if: matrix.jni == 'ON' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $jvmDll = Get-ChildItem -Path "$env:JAVA_HOME" -Filter "jvm.dll" -Recurse | Select-Object -First 1
          Write-Host "Bundling $($jvmDll.FullName)"
          Copy-Item $jvmDll.FullName "${{ github.workspace }}\install\lib\"

      - name: Download fat-JAR (GraalVM variants)
        if: matrix.native_image == true
        uses: actions/download-artifact@v4
        with:
          name: release-jar
          path: jar

      # Build the real powsybl native image and place it directly in
      # install/lib/ so the package is self-contained.
      - name: Build native image
        if: matrix.native_image == true
        shell: bash
        run: |
          JAR=$(ls jar/*.jar | head -1)
          native-image \
            --shared \
            -cp "$JAR" \
            -H:+ReportExceptionStackTraces \
            -march=compatibility \
            --no-fallback \
            --gc=serial \
            -o "${{ github.workspace }}/install/lib/libpowsybl-iidm-native" \
            --allow-incomplete-classpath \
            --add-exports=org.graalvm.nativeimage.builder/com.oracle.svm.core.c=ALL-UNNAMED

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          PKG="iidm-bridge-${{ github.ref_name }}-${{ matrix.name }}.tar.gz"
          tar -czf "$PKG" -C "${{ github.workspace }}/install" .
          echo "PKG_FILE=$PKG" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "iidm-bridge-${{ github.ref_name }}-${{ matrix.name }}.zip"
          Compress-Archive -Path "${{ github.workspace }}\install\*" -DestinationPath $pkg
          "PKG_FILE=$pkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PKG_FILE }}

      # Short-lived artifact for the smoke-test job (GraalVM variants only).
      - name: Upload workflow artifact (for smoke test)
        if: matrix.name == 'linux-x86_64-graalvm'
        uses: actions/upload-artifact@v4
        with:
          name: release-pkg-smoke
          path: ${{ env.PKG_FILE }}
          retention-days: 1

  # ── Smoke test: find_package + GraalVM backend end-to-end ────────────────
  #
  # Uses the self-contained linux-x86_64-graalvm package to verify that a
  # consumer CMake project can find_package(IidmBridge), link, load
  # IEEE14.xiidm through the bundled GraalVM native image, and read the
  # targetP of generator _GEN____3_SM.
  smoke-test:
    name: Smoke test (linux-x86_64-graalvm)
    needs: release-cpp
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout (for IEEE14.xiidm)
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install CMake and Ninja
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build

      - name: Download release package
        uses: actions/download-artifact@v4
        with:
          name: release-pkg-smoke
          path: pkg

      - name: Extract release package
        run: |
          mkdir -p "${{ github.workspace }}/iidmbridge"
          tar -xzf pkg/*.tar.gz -C "${{ github.workspace }}/iidmbridge"

      - name: Write consumer project
        shell: bash
        run: |
          mkdir -p consumer

          cat > consumer/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(smoke_test CXX)
          set(CMAKE_CXX_STANDARD 17)
          find_package(IidmBridge REQUIRED)
          add_executable(smoke_test main.cpp)
          target_link_libraries(smoke_test PRIVATE IidmBridge::iidmbridge)
          EOF

          cat > consumer/main.cpp << 'EOF'
          #include <iidm/iidm.h>
          #include <iostream>

          int main(int argc, char* argv[]) {
              if (argc < 2) {
                  std::cerr << "Usage: smoke_test <path-to-xiidm>\n";
                  return 1;
              }
              iidm::NetworkLoadOptions opts;
              opts.mode = iidm::BackendMode::GRAALVM;
              auto network = iidm::NetworkFactory::load(argv[1], opts);
              auto gen = network.getGenerator("_GEN____3_SM");
              if (!gen.has_value()) {
                  std::cerr << "Generator _GEN____3_SM not found\n";
                  return 2;
              }
              std::cout << "targetP(_GEN____3_SM) = " << gen->getTargetP() << " MW\n";
              return 0;
          }
          EOF

      - name: Configure consumer project
        run: |
          cmake -S consumer -B consumer/build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/iidmbridge"

      - name: Build consumer project
        run: cmake --build consumer/build --parallel

      - name: Run smoke test
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/iidmbridge/lib
        run: ./consumer/build/smoke_test examples/IEEE14.xiidm

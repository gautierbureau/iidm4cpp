name: CI

on:
  push:
    branches: [ master, 'claude/**' ]
  pull_request:
    branches: [ master ]

jobs:
  # ── Java build & test ───────────────────────────────────────────────────────
  java:
    name: Java (Maven)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and test (Maven)
        working-directory: java
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: iidm-bridge-java
          path: java/target/iidm-bridge-java-*.jar
          if-no-files-found: warn

  # ── C++ build & test ────────────────────────────────────────────────────────
  cpp:
    name: C++ (CMake / GTest)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build \
            default-jdk \
            libgtest-dev \
            googletest

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DIIDM_BRIDGE_ENABLE_GRAALVM=OFF \
            -DIIDM_BRIDGE_ENABLE_JNI=ON \
            -DIIDM_BRIDGE_BUILD_TESTS=ON \
            -DIIDM_BRIDGE_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure --parallel 4

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-test-results
          path: build/Testing/
          if-no-files-found: ignore

  # ── Matrix: also test with GraalVM disabled + JNI disabled ──────────────────
  cpp-matrix:
    name: C++ (${{ matrix.name }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: JNI-only
            graalvm: OFF
            jni: ON
          - name: no-backends
            graalvm: OFF
            jni: OFF

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build \
            default-jdk \
            libgtest-dev \
            googletest

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DIIDM_BRIDGE_ENABLE_GRAALVM=${{ matrix.graalvm }} \
            -DIIDM_BRIDGE_ENABLE_JNI=${{ matrix.jni }} \
            -DIIDM_BRIDGE_BUILD_TESTS=ON \
            -DIIDM_BRIDGE_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure --parallel 4

name: CI

on:
  push:
    branches: [ master, 'claude/**' ]
  pull_request:
    branches: [ master ]

jobs:
  java:
    name: Java (Maven)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test (Maven)
        working-directory: java
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: iidm-bridge-java
          path: java/target/iidm-bridge-java-*.jar
          if-no-files-found: warn

  # ── C++ unit tests: Ubuntu, macOS, Windows ──────────────────────────────────
  #
  # GTest is fetched automatically via FetchContent when not found locally,
  # so no separate GTest installation step is required on any platform.
  cpp:
    name: C++ unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Linux: install CMake and Ninja (not bundled on the runner image)
      - name: Install CMake and Ninja (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build

      # macOS: install CMake and Ninja via Homebrew
      - name: Install CMake and Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      # Windows: jvm.dll lives in JAVA_HOME/bin/server which actions/setup-java
      # does not add to PATH.  iidmbridge.dll (built with JNI=ON) lists jvm.dll
      # as a dependency, so it must be findable when the test exe runs.
      - name: Add JVM server dir to PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "$JAVA_HOME/bin/server" >> $GITHUB_PATH

      # Windows: activate the MSVC developer environment so that cl.exe and
      # link.exe are on PATH when CMake/Ninja run.
      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DIIDM_BRIDGE_ENABLE_GRAALVM=OFF \
            -DIIDM_BRIDGE_ENABLE_JNI=ON \
            -DIIDM_BRIDGE_BUILD_TESTS=ON \
            -DIIDM_BRIDGE_BUILD_EXAMPLES=OFF \
            -DIIDM_BRIDGE_BUILD_JAVA=OFF \
            -DIIDM_BRIDGE_BUILD_NATIVE=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure --parallel 4

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-test-results-${{ matrix.os }}
          path: build/Testing/
          if-no-files-found: ignore

  # ── C++ GraalVM backend: Ubuntu and macOS ────────────────────────────────────
  #
  # Builds the Java fat-JAR and the GraalVM native image via cmake
  # (IIDM_BRIDGE_BUILD_JAVA=ON / IIDM_BRIDGE_BUILD_NATIVE=ON), so a single
  # cmake configure + build call produces everything including graal_isolate.h.
  # The Linux leg also uploads the native artifacts for the integration job.
  #
  # Windows is excluded: GraalVM --shared on Windows requires a Visual Studio
  # toolchain that is not supported here.
  graalvm:
    name: C++ GraalVM backend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            native_lib: libpowsybl-iidm-native.so
            lib_path_env: LD_LIBRARY_PATH
          - os: macos-latest
            native_lib: libpowsybl-iidm-native.dylib
            lib_path_env: DYLD_LIBRARY_PATH

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM CE 21 with native-image
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          native-image: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install C++ build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build

      - name: Install C++ build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Configure CMake (GraalVM backend ON, build JAR + native image)
        shell: bash
        run: |
          cmake -S . -B build-graalvm \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DIIDM_BRIDGE_ENABLE_GRAALVM=ON \
            -DIIDM_BRIDGE_ENABLE_JNI=ON \
            -DIIDM_BRIDGE_BUILD_TESTS=ON \
            -DIIDM_BRIDGE_BUILD_EXAMPLES=OFF \
            -DIIDM_BRIDGE_BUILD_JAVA=ON \
            -DIIDM_BRIDGE_BUILD_NATIVE=ON

      - name: Build
        run: cmake --build build-graalvm --parallel

      - name: Run unit tests
        shell: bash
        run: |
          export ${{ matrix.lib_path_env }}="${{ github.workspace }}/build-graalvm/graalvm-native"
          IIDM_BRIDGE_GRAALVM_LIB="${{ github.workspace }}/build-graalvm/graalvm-native/${{ matrix.native_lib }}" \
          ctest --test-dir build-graalvm --output-on-failure --parallel 4

      - name: Upload native image artifacts (Linux only, for integration job)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: iidm-bridge-native
          path: |
            build-graalvm/graalvm-native/libpowsybl-iidm-native.so
            build-graalvm/graalvm-native/graal_isolate.h
            build-graalvm/graalvm-native/graal_isolate_dynamic.h
          if-no-files-found: error

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: graalvm-test-results-${{ matrix.os }}
          path: build-graalvm/Testing/
          if-no-files-found: ignore

  # ── Integration tests against the real IEEE14 network ────────────────────────
  integration:
    name: Integration tests (examples + real IEEE14 network)
    runs-on: ubuntu-22.04
    needs: graalvm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install C++ build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build

      - name: Download native image artifacts
        uses: actions/download-artifact@v4
        with:
          name: iidm-bridge-native
          path: native-artifacts

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DIIDM_BRIDGE_ENABLE_GRAALVM=ON \
            -DIIDM_BRIDGE_ENABLE_JNI=ON \
            -DIIDM_BRIDGE_BUILD_TESTS=ON \
            -DIIDM_BRIDGE_BUILD_EXAMPLES=ON \
            -DIIDM_BRIDGE_BUILD_JAVA=ON \
            -DIIDM_BRIDGE_BUILD_NATIVE=ON \
            -DGRAALVM_INCLUDE_DIRS="${{ github.workspace }}/native-artifacts"

      - name: Build
        run: |
          cmake --build build --parallel --target all
          cmake --build build --parallel --target iidmbridge_jar

      - name: Run example_standalone with IEEE14.xiidm
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/native-artifacts
          IIDM_BRIDGE_GRAALVM_LIB: ${{ github.workspace }}/native-artifacts/libpowsybl-iidm-native.so
        run: ./build/examples/standalone/example_standalone examples/IEEE14.xiidm

      - name: Compile JavaLauncher
        run: |
          mkdir -p build/java-classes
          ls java/target/
          javac \
            -cp "java/target/iidm-bridge-java-1.0.0-SNAPSHOT-fat.jar" \
            examples/embedded/JavaLauncher.java \
            -d build/java-classes

      - name: Run embedded example with IEEE14.xiidm
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/build:${{ github.workspace }}/build/examples/embedded
        run: |
          java \
            -cp "java/target/iidm-bridge-java-1.0.0-SNAPSHOT-fat.jar:build/java-classes" \
            -Djava.library.path=${{ github.workspace }}/build/examples/embedded \
            JavaLauncher examples/IEEE14.xiidm

      - name: Run tests (including TestIntegration with real network)
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/native-artifacts
          IIDM_BRIDGE_GRAALVM_LIB: ${{ github.workspace }}/native-artifacts/libpowsybl-iidm-native.so
          IIDM_IEEE14_NETWORK_PATH: ${{ github.workspace }}/examples/IEEE14.xiidm
        run: ctest --test-dir build --output-on-failure --parallel 4

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: build/Testing/
          if-no-files-found: ignore

  # ── Matrix: additional CMake flag combinations (Linux only) ──────────────────
  cpp-matrix:
    name: C++ (${{ matrix.name }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: JNI-only
            graalvm: OFF
            jni: ON
          - name: no-backends
            graalvm: OFF
            jni: OFF

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install CMake and Ninja
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DIIDM_BRIDGE_ENABLE_GRAALVM=${{ matrix.graalvm }} \
            -DIIDM_BRIDGE_ENABLE_JNI=${{ matrix.jni }} \
            -DIIDM_BRIDGE_BUILD_TESTS=ON \
            -DIIDM_BRIDGE_BUILD_EXAMPLES=OFF \
            -DIIDM_BRIDGE_BUILD_JAVA=OFF \
            -DIIDM_BRIDGE_BUILD_NATIVE=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure --parallel 4
